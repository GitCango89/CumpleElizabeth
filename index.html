<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feliz Cumpleaños Elizabeth</title>
    <img src="ely.jpeg"
     alt="Elizabeth"
     style="width:250px;
            border-radius:50%;
            border:5px solid white;
            box-shadow:0 0 20px white;">

    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
            text-align: center;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            color: white;
        }

        .contenedor {
            margin-top: 100px;
            position: relative;
            z-index: 2;
        }

        h1 {
            font-size: 60px;
            animation: brillo 2s infinite alternate;
        }

        h2 {
            font-size: 30px;
        }

        p {
            font-size: 22px;
            width: 80%;
            margin: auto;
        }

        button {
            margin-top: 30px;
            padding: 15px 30px;
            font-size: 20px;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            background: white;
            color: #ff4d6d;
            font-weight: bold;
        }

        button:hover {
            transform: scale(1.1);
        }

        #mensaje {
            display: none;
            margin-top: 20px;
            font-size: 24px;
        }

        @keyframes brillo {
            from {
                text-shadow: 0 0 10px white;
            }
            to {
                text-shadow: 0 0 30px yellow, 0 0 50px orange;
            }
        }

        .globo {
            position: absolute;
            bottom: -100px;
            font-size: 110px;
            animation: subir linear infinite;
        }

        @keyframes subir {
            from {
                transform: translateY(0);
            }
            to {
                transform: translateY(-120vh);
            }
        }

        .g1 { left: 10%; animation-duration: 8s; font-size: 100px;}
        .g2 { left: 25%; animation-duration: 10s; font-size: 140px;}
        .g3 { left: 40%; animation-duration: 7s; font-size: 110px;}
        .g4 { left: 60%; animation-duration: 9s; font-size: 150px;}
        .g5 { left: 80%; animation-duration: 11s; font-size: 115px;}
    </style>
</head>

<body>

    <div class="contenedor">
        <h1>🎉 ¡Feliz Cumpleaños Elizabeth! 🎂</h1>

        <h2>Que tengas un día maravilloso ✨</h2>

        <p>
            Querida hermana, te deseo mucha felicidad,
            salud, amor y éxito en cada paso que des.
            Gracias por ser una persona tan especial.
        </p>

        <button onclick="mostrarMensaje()">
            🎁 Abrir Sorpresa
        </button>

        <div id="mensaje">
            ❤️ Te quiero mucho hermanita. Que todos tus sueños se hagan realidad. ❤️
        </div>
    </div>

    <div class="globo g1">🎈</div>
    <div class="globo g2">🎈</div>
    <div class="globo g3">🎈</div>
    <div class="globo g4">🎈</div>
    <div class="globo g5">🎈</div>

    <script>
        function mostrarMensaje() {
            document.getElementById("mensaje").style.display = "block";
        }
    </script>

</body>
<audio id="musica" loop>
    <source src="happy_birthday_nkotb.mp3" type="audio/mpeg">
</audio>

<button id="playMusic" onclick="document.getElementById('musica').play()"
style="position:absolute; top:20px; right:20px; padding:10px 20px;
font-size:18px; border:none; border-radius:10px; cursor:pointer;">
    🎵 Reproducir Música
</button>
</html>

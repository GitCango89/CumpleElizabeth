<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feliz Cumpleaños Elizabeth</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            /* Cambiado para evitar que la pantalla se estire a los lados en el celular */
            overflow-x: hidden; 
            font-family: Arial, sans-serif;
            text-align: center;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            color: white;
            min-height: 100vh;
        }

        .contenedor {
            /* Bajamos el margen para dar espacio a la foto y el botón */
            margin-top: 30px; 
            padding: 15px;
            position: relative;
            z-index: 2;
            box-sizing: border-box;
        }

        /* Estilo para la foto de Elizabeth */
        .foto-perfil {
            width: 220px;
            height: 220px;
            object-fit: cover;
            border-radius: 50%;
            border: 5px solid white;
            box-shadow: 0 0 20px white;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 45px;
            animation: brillo 2s infinite alternate;
            margin: 15px 0;
        }

        h2 {
            font-size: 26px;
            margin: 10px 0;
        }

        p {
            font-size: 20px;
            width: 90%;
            max-width: 600px;
            margin: auto;
            line-height: 1.5;
        }

        /* Botón de Sorpresa */
        .btn-sorpresa {
            margin-top: 25px;
            padding: 15px 30px;
            font-size: 20px;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            background: white;
            color: #ff4d6d;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .btn-sorpresa:hover {
            transform: scale(1.05);
        }

        /* Botón de Música Adaptable */
        .btn-musica {
            margin: 15px auto;
            display: inline-block;
            padding: 10px 20px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: white;
            color: #ff4d6d;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        #mensaje {
            display: none;
            margin-top: 25px;
            font-size: 22px;
            font-weight: bold;
            padding: 0 10px;
        }

        @keyframes brillo {
            from { text-shadow: 0 0 10px white; }
            to { text-shadow: 0 0 25px yellow, 0 0 40px orange; }
        }

        /* Globos decorativos */
        .globo {
            position: absolute;
            bottom: -150px;
            z-index: 1;
            animation: subir linear infinite;
        }

        @keyframes subir {
            from { transform: translateY(0); }
            to { transform: translateY(-130vh); }
        }

        .g1 { left: 5%; animation-duration: 8s; font-size: 70px;}
        .g2 { left: 20%; animation-duration: 10s; font-size: 90px;}
        .g3 { left: 40%; animation-duration: 7s; font-size: 80px;}
        .g4 { left: 65%; animation-duration: 9s; font-size: 95px;}
        .g5 { left: 85%; animation-duration: 11s; font-size: 75px;}

        /* ADAPTACIÓN ESPECIAL PARA CELULARES */
        @media (max-width: 480px) {
            h1 { font-size: 32px; }
            h2 { font-size: 22px; }
            p { font-size: 18px; width: 95%; }
            .foto-perfil { width: 180px; height: 180px; }
            .btn-sorpresa { width: 90%; font-size: 18px; }
            .btn-musica { width: 90%; font-size: 16px; }
            #mensaje { font-size: 18px; }
            .globo { font-size: 50px !important; } /* Achica los globos para que no tapen la pantalla */
        }
    </style>
</head>

<body>

    <div class="contenedor">
        
        <button class="btn-musica" onclick="document.getElementById('musica').play()">
            🎵 Reproducir Música
        </button>
        
        <br>
        
        <img src="ely.jpeg" alt="Elizabeth" class="foto-perfil">

        <h1>🎉 ¡Feliz Cumpleaños Elizabeth! 🎂</h1>

        <h2>Que tengas un día maravilloso ✨</h2>

        <p>
            Querida hermana, te deseo mucha felicidad,
            salud, amor y éxito en cada paso que des.
            Gracias por ser una persona tan especial.
        </p>

        <button class="btn-sorpresa" onclick="mostrarMensaje()">
            🎁 Abrir Sorpresa
        </button>

        <div id="mensaje">
            ❤️ Te quiero mucho hermanita. Que todos tus sueños se hagan realidad. ❤️
        </div>
    </div>

    <div class="globo g1">🎈</div>
    <div class="globo g2">🎈</div>
    <div class="globo g3">🎈</div>
    <div class="globo g4">🎈</div>
    <div class="globo g5">🎈</div>

    <audio id="musica" loop>
        <source src="happy_birthday_nkotb.mp3" type="audio/mpeg">
    </audio>

    <script>
        function mostrarMensaje() {
            document.getElementById("mensaje").style.display = "block";
        }
    </script>

</body>
</html>
